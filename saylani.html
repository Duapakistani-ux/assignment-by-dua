
<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="saylani.css" />
</head>
<body>

  <div class="container">
    <h1>Student Registration Form</h1>

    <form id="studentForm">

      <!-- Full Name -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" />
        <small class="error" id="nameError"></small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" />
        <small class="error" id="emailError"></small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" />
        <small class="error" id="passwordError"></small>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" />
        <small class="error" id="confirmPasswordError"></small>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" />
        <small class="error" id="phoneError"></small>
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <input type="radio" name="gender" value="Male" /> Male
          <input type="radio" name="gender" value="Female" /> Female
        </div>
        <small class="error" id="genderError"></small>
      </div>

      <!-- Course -->
      <div class="form-group">
        <label>Course Selection</label>
        <select id="course">
          <option value="">Select Course</option>
          <option value="Web Development">Web Development</option>
          <option value="Graphic Designing">Graphic Designing</option>
          <option value="Mobile App Development">Mobile App Development</option>
        </select>
        <small class="error" id="courseError"></small>
      </div>

      <!-- Hobbies -->
      <div class="form-group">
        <label>Hobbies</label>
        <div class="checkbox-group">
          <input type="checkbox" value="Reading" class="hobby" /> Reading
          <input type="checkbox" value="Sports" class="hobby" /> Sports
          <input type="checkbox" value="Gaming" class="hobby" /> Gaming
        </div>
      </div>

      <!-- Message -->
      <div class="form-group">
        <label>About Yourself</label>
        <textarea id="message"></textarea>
      </div>

      <button type="submit">Register</button>

    </form>

    <div class="output">
      <h2>Submitted Students</h2>
      <div id="studentData"></div>
    </div>

  </div>

  <script src="saylani.js"></script>
</body>
</html>
